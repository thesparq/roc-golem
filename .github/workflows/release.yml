name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version, e.g. 0.1.0 or 0.1.0-rc1"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build platform bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-tools
        run: cargo install wasm-tools

      - name: Install Roc nightly
        uses: roc-lang/setup-roc@v3
        with:
          version: nightly

      - name: Build & validate demo component
        run: bash build.sh

      - name: Produce platform bundle
        run: python3 scripts/bundle.py

      - name: Capture bundle filename
        id: bundle
        run: |
          bundle_file=$(ls dist/*.tar.zst | head -1)
          bundle_name=$(basename "$bundle_file")
          echo "bundle_name=$bundle_name" >> "$GITHUB_OUTPUT"
          echo "bundle_path=$bundle_file" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.release_version }}" \
            --repo "${{ github.repository }}" \
            --title "${{ inputs.release_version }}" \
            --generate-notes \
            "${{ steps.bundle.outputs.bundle_path }}" \
            out/golem-component.wasm
